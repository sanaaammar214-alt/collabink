version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: collabink-mysql
    environment:
      MYSQL_DATABASE: collabink
      MYSQL_ROOT_PASSWORD: collabink123
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./blog/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./blog
    container_name: collabink-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/collabink?useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: collabink123
      UPLOAD_DIR: uploads/images
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  uploads-data:
