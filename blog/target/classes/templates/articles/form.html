<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<body>

<div class="page-title">
    <div class="container">
        <h1 th:text="${article.id != null} ? 'Modifier l\'article' : 'Écrire un article'">Article</h1>
        <nav class="breadcrumbs">
            <ol>
                <li><a th:href="@{/}">Accueil</a></li>
                <li><a th:href="@{/articles}">Articles</a></li>
                <li class="current" th:text="${article.id != null} ? 'Modifier' : 'Nouveau'">Nouveau</li>
            </ol>
        </nav>
    </div>
</div>

<section class="section" style="padding: 3rem 0;">
    <div class="container" style="max-width: 800px;">

        <div class="alert alert-danger" th:if="${error}">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <span th:text="${error}">Erreur</span>
        </div>

        <!-- Création : POST /articles/save -->
        <!-- Modification : POST /articles/{id}/update -->
        <form th:action="${article.id != null} ? @{/articles/{id}/update(id=${article.id})} : @{/articles/save}"
              method="post"
              enctype="multipart/form-data"
              class="p-4 bg-white border rounded-3 shadow-sm">

            <div class="mb-4">
                <label class="form-label fw-semibold">Titre <span class="text-danger">*</span></label>
                <input type="text" name="titre" class="form-control form-control-lg"
                       th:value="${article.titre}"
                       placeholder="Un titre accrocheur..." required
                       style="font-family:'EB Garamond',serif;font-size:1.3rem;">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Catégorie</label>
                <select name="categorieId" class="form-select">
                    <option value="">— Sans catégorie —</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.nom}"
                            th:selected="${article.categorie != null and article.categorie.id == cat.id}">
                        Catégorie
                    </option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Contenu <span class="text-danger">*</span></label>
                <textarea name="contenu" class="form-control" rows="14"
                          placeholder="Rédigez votre article ici..."
                          required
                          style="font-size:1rem;line-height:1.7;"
                          th:text="${article.contenu}"></textarea>
                <div class="form-text">Vous pouvez utiliser des retours à la ligne pour structurer votre texte.</div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Photo de l'article</label>
                <input type="file" name="imageFile" class="form-control" accept="image/*"
                       onchange="if(this.files[0]?.size > 5*1024*1024){ alert('Image trop lourde (max 5 Mo)'); this.value=''; }">
                <div th:if="${article.image != null}" class="mt-2">
                    <img th:src="@{/uploads/images/{img}(img=${article.image})}"
                         alt="Image actuelle"
                         style="max-height:200px;border-radius:8px;object-fit:cover;">
                    <p class="form-text text-muted mt-1"><i class="bi bi-info-circle me-1"></i>Image actuelle — laisser vide pour la conserver.</p>
                </div>
            </div>

            <div class="d-flex gap-3 justify-content-between">
                <a th:href="${article.id != null} ? @{/articles/{id}(id=${article.id})} : @{/articles}"
                   class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Annuler
                </a>
                <div class="d-flex gap-2">
                    <button type="submit" name="statut" value="BROUILLON" class="btn btn-outline-secondary">
                        <i class="bi bi-file-earmark me-1"></i> Sauvegarder brouillon
                    </button>
                    <button type="submit" name="statut" value="PUBLIE" class="btn fw-bold px-4"
                            style="background:#c9a84c;color:#111;border:none;">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${article.id != null} ? 'Enregistrer les modifications' : 'Publier l\'article'">Publier</span>
                    </button>
                </div>
            </div>
        </form>
    </div>
</section>

</body>
</html>
