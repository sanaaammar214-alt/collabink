<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::main})}">
<body>

<!-- Page Title -->
<div class="page-title">
    <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">Articles</h1>
        <nav class="breadcrumbs">
            <ol>
                <li><a th:href="@{/}">Accueil</a></li>
                <li class="current">Articles</li>
            </ol>
        </nav>
    </div>
</div>

<main class="container">

<section class="section">
    <div class="container">

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${successMessage}">Succès</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Barre de recherche + filtres -->
        <div class="row mb-4 align-items-end g-3">
            <div class="col-md-5">
                <form th:action="@{/articles}" method="get">
                    <div class="input-group">
                        <input type="text" name="q" class="form-control"
                               placeholder="Rechercher..."
                               th:value="${searchQuery}">
                        <button type="submit" class="btn" style="background:#c9a84c;color:#111;border:none;">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
            </div>
            <div class="col-md-4">
                <div class="d-flex gap-2">
                    <select class="form-select shadow-sm" onchange="location = this.value;" style="border-color: #dee2e6;">
                        <option th:value="@{/articles}" th:selected="${categorieSelectionnee == null and sortSelectionne == null}">Toutes les catégories</option>
                        <option th:each="cat : ${categories}"
                                th:value="@{/articles(categorieId=${cat.id})}"
                                th:text="${cat.nom}"
                                th:selected="${categorieSelectionnee == cat.id}">
                            Catégorie
                        </option>
                    </select>
                    <a th:href="@{/articles(sort=likes)}" class="btn btn-outline-secondary text-nowrap shadow-sm"
                       th:classappend="${sortSelectionne == 'likes'} ? ' active' : ''">
                        <i class="bi bi-heart-fill" style="color:#c8102e;"></i> Populaires
                    </a>
                </div>
            </div>
            <div class="col-md-3 text-end">
                <a sec:authorize="hasAnyRole('AUTEUR','ADMIN')"
                   th:href="@{/articles/new}"
                   class="btn fw-semibold"
                   style="background:#c9a84c;color:#111;border:none;">
                    <i class="bi bi-pencil-square me-1"></i> Écrire
                </a>
            </div>
        </div>

        <!-- Message recherche -->
        <div th:if="${searchQuery != null}" class="alert alert-info mb-4">
            <i class="bi bi-search me-2"></i>
            Résultats pour "<strong th:text="${searchQuery}"></strong>" :
            <span th:text="${articles.size()}">0</span> article(s) trouvé(s).
            <a th:href="@{/articles}" class="ms-2">Effacer</a>
        </div>

        <!-- Liste articles -->
        <div class="row gy-4" th:if="${!articles.isEmpty()}">
            <div class="col-md-4" th:each="article : ${articles}">
                <div class="card h-100 border-0 shadow-sm" style="transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='none'">
                    <img th:if="${article.image != null and !article.image.isBlank()}"
                         th:src="@{/uploads/images/{img}(img=${article.image})}"
                         class="card-img-top object-fit-cover"
                         style="height: 200px;"
                         th:alt="${article.titre}">
                    <div th:if="${article.image == null or article.image.isBlank()}"
                         class="card-img-top d-flex align-items-center justify-content-center bg-light"
                         style="height: 200px;">
                        <i class="bi bi-image text-muted" style="font-size: 3rem;"></i>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge rounded-pill px-2 py-1"
                                  style="background: rgba(201,168,76,0.1); color: #856404; font-size: 0.6rem; text-transform: uppercase;"
                                  th:text="${article.categorie != null ? article.categorie.nom : 'Non classé'}">
                                Catégorie
                            </span>
                            <small class="text-muted"
                                   th:text="${#temporals.format(article.datePublication,'dd MMM yyyy')}">
                                Date
                            </small>
                        </div>

                        <h5 class="card-title" style="font-family:'EB Garamond',serif;font-size:1.2rem;line-height:1.3;">
                            <a th:href="@{/articles/{id}(id=${article.id})}"
                               th:text="${article.titre}"
                               style="text-decoration:none;color:#1a1a2e;">Titre</a>
                        </h5>

                        <p class="card-text text-muted flex-grow-1"
                           style="font-size:0.87rem;"
                           th:text="${#strings.abbreviate(article.contenu, 130)}">Extrait</p>

                        <div class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top">
                            <small class="fw-semibold" th:text="${article.auteur.nom}">Auteur</small>
                            <div class="d-flex gap-3">
                                <small style="color:#c8102e;">
                                    <i class="bi bi-heart-fill"></i>
                                    <span th:text="${article.likes.size()}">0</span>
                                </small>
                                <small class="text-muted">
                                    <i class="bi bi-chat"></i>
                                    <span th:text="${article.commentaires.size()}">0</span>
                                </small>
                            </div>
                        </div>

                        <!-- Bouton Voir Plus -->
                        <div class="mt-2">
                            <a th:href="@{/articles/{id}(id=${article.id})}"
                               class="btn btn-sm w-100 fw-semibold"
                               style="background: #c9a84c; color: #111; border: none;">
                                <i class="bi bi-eye me-1"></i> Voir plus
                            </a>
                        </div>

                        <!-- Actions propriétaire/admin -->
                        <div class="d-flex gap-2 mt-2"
                             th:if="${currentUser != null and (currentUser.id == article.auteur.id or currentUser.role.name() == 'ADMIN')}">
                            <a th:href="@{/articles/{id}/edit(id=${article.id})}"
                               class="btn btn-sm btn-outline-secondary flex-fill">
                                <i class="bi bi-pencil"></i> Modifier
                            </a>
                            <form th:action="@{/articles/{id}/delete(id=${article.id})}" method="post"
                                  onsubmit="return confirm('Supprimer cet article ?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vide -->
        <div class="text-center py-5" th:if="${articles.isEmpty()}">
            <i class="bi bi-journal-x" style="font-size:3rem;color:#c9a84c;"></i>
            <p class="mt-3 text-muted">Aucun article trouvé.</p>
            <a th:href="@{/articles}" class="btn btn-outline-secondary mt-2">Voir tous les articles</a>
        </div>

        <!-- Pagination -->
        <div class="mt-5 d-flex justify-content-center" th:if="${totalPages > 1}">
            <nav aria-label="Pagination">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/articles(page=${currentPage - 1})}" aria-label="Précédent">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link" th:href="@{/articles(page=${i})}" th:text="${i + 1}"
                           th:style="${currentPage == i ? 'background-color: #c9a84c; border-color: #c9a84c; color: #111;' : ''}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/articles(page=${currentPage + 1})}" aria-label="Suivant">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

    </div>
</section>

</main>

</body>
</html>
