<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Articles — Admin · CollabInk</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
    <style>
        /* Palette claire cohérente avec la page d'accueil dorée */
        :root{--bg:#f8f6f2;--surface:#ffffff;--border:#e0ded7;--text:#1a1a2e;--muted:#6b6875;--accent:#c9a84c;--gold:#c9a84c;--serif:'EB Garamond',serif;--sans:'Inter',sans-serif;--mono:'DM Mono',monospace;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;display:flex;min-height:100vh;}
        .sidebar{width:240px;min-width:240px;background:#1a1a2e;border-right:1px solid var(--border);display:flex;flex-direction:column;color:#f5f3ea;}
        .sidebar-brand{padding:1.5rem;border-bottom:1px solid var(--border);}
        .sidebar-brand a{font-family:var(--serif);font-size:1.4rem;font-weight:700;text-decoration:none;color:#f5f3ea;}
        .sidebar-brand a span{color:var(--accent);}
        .sidebar-brand p{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:0.2rem;}
        .sidebar-nav{flex:1;padding:1rem 0;}
        .nav-section{font-family:var(--mono);font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);padding:1rem 1.5rem 0.4rem;}
        .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.5rem;text-decoration:none;color:var(--muted);font-size:0.85rem;transition:all 0.2s;border-left:2px solid transparent;}
        .nav-item:hover{color:#f5f3ea;background:rgba(255,255,255,0.04);}
        .nav-item.active{color:#f5f3ea;border-left-color:var(--accent);background:rgba(201,168,76,0.18);}
        .sidebar-footer{padding:1rem;border-top:1px solid var(--border);}
        .logout-form button{width:100%;padding:0.6rem;background:transparent;border:1px solid var(--border);color:#f5f3ea;font-family:var(--sans);font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
        .logout-form button:hover{border-color:var(--accent);color:var(--accent);}
        .main{flex:1;overflow-y:auto;}
        .main-header{padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--border);}
        .main-header h1{font-family:var(--serif);font-size:2rem;}
        .main-header p{font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;color:var(--muted);margin-top:0.2rem;}
        .main-body{padding:2rem 2.5rem;}
        table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);}
        th{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:0.9rem 1.2rem;text-align:left;border-bottom:1px solid var(--border);}
        td{padding:0.85rem 1.2rem;font-size:0.82rem;border-bottom:1px solid var(--border);}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:rgba(255,255,255,0.02);}
        td a{color:var(--text);text-decoration:none;font-weight:500;}
        td a:hover{color:var(--accent);}
        .cat-badge{font-family:var(--mono);font-size:0.58rem;padding:0.2rem 0.5rem;background:rgba(196,154,42,0.1);color:var(--gold);border:1px solid rgba(196,154,42,0.2);}
        .btn-act{font-family:var(--sans);font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.3rem 0.65rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;text-decoration:none;display:inline-block;transition:all 0.2s;}
        .btn-act:hover{color:var(--text);border-color:var(--muted);}
        .btn-act.danger:hover{border-color:var(--accent);color:var(--accent);}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <a href="/articles">Collab<span>Ink</span></a>
        <p>Panneau Admin</p>
    </div>
    <nav class="sidebar-nav">
        <p class="nav-section">Navigation</p>
        <a th:href="@{/admin/dashboard}" class="nav-item">◈ Dashboard</a>
        <a th:href="@{/admin/users}" class="nav-item">◉ Utilisateurs</a>
        <a th:href="@{/admin/articles}" class="nav-item active">◧ Articles</a>
        <a th:href="@{/admin/categories}" class="nav-item">◫ Catégories</a>
        <p class="nav-section">Blog</p>
        <a th:href="@{/articles}" class="nav-item">↗ Voir le blog</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit">↩ Déconnexion</button>
        </form>
    </div>
</aside>
<main class="main">
    <div class="main-header">
        <h1>Articles</h1>
        <p th:text="${articles.size()} + ' articles publiés'">0 articles</p>
    </div>
    <div class="main-body">
        <div th:if="${successMessage}" class="alert alert-success mb-3" style="border-color: rgba(201,168,76,0.35); background: rgba(201,168,76,0.12); color: var(--text);">
            <strong style="color: var(--accent);">Succès :</strong>
            <span th:text="${successMessage}">Action effectuée.</span>
        </div>
        <table>
            <thead>
            <tr><th>#</th><th>Titre</th><th>Auteur</th><th>Catégorie</th><th>Date</th><th>❤</th><th>💬</th><th>Actions</th></tr>
            </thead>
            <tbody>
            <tr th:each="a : ${articles}">
                <td style="color:var(--muted);font-family:var(--mono);font-size:0.7rem;" th:text="${a.id}">1</td>
                <td><a th:href="@{/articles/{id}(id=${a.id})}"
                       th:text="${#strings.abbreviate(a.titre,35)}">Titre</a></td>
                <td style="color:var(--muted);" th:text="${a.auteur.nom}">Auteur</td>
                <td>
                    <span th:if="${a.categorie != null}" class="cat-badge" th:text="${a.categorie.nom}">Cat</span>
                    <span th:if="${a.categorie == null}" style="color:var(--muted);">—</span>
                </td>
                <td style="color:var(--muted);font-family:var(--mono);font-size:0.72rem;"
                    th:text="${#temporals.format(a.datePublication,'dd/MM/yy')}">Date</td>
                <td style="color:var(--accent);" th:text="${a.likes.size()}">0</td>
                <td style="color:var(--muted);" th:text="${a.commentaires.size()}">0</td>
                <td>
                    <div style="display:flex;gap:0.4rem;">
                        <!-- Auteur peut modifier -->
                        <a th:if="${#authentication.name == a.auteur.email}" 
                           th:href="@{/articles/{id}/edit(id=${a.id})}" class="btn-act">Modifier</a>
                        
                        <!-- Admin : seulement supprimer avec page de confirmation -->
                        <a th:if="${#authorization.expression('hasRole(''ADMIN'')') and #authentication.name != a.auteur.email}"
                           th:href="@{/admin/articles/{id}/supprimer(id=${a.id})}" 
                           class="btn-act danger">
                            <i class="bi bi-shield-exclamation me-1"></i>Supprimer
                        </a>
                        
                        <!-- Auteur supprime son article : formulaire simple -->
                        <form th:if="${#authentication.name == a.auteur.email}"
                              th:action="@{/articles/{id}/delete(id=${a.id})}" method="post"
                              onsubmit="return confirm('Supprimer votre article ?')">
                            <button type="submit" class="btn-act danger">Supprimer</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(articles)}">
                <td colspan="8" style="text-align:center;color:var(--muted);">Aucun article.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
