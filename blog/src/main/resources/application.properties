# ===================================================================
# CONFIGURATION SPRING BOOT - COLLABINK BLOG COLLABORATIF
# ===================================================================

# --- DATABASE CONFIGURATION ---
# URL de connexion à la base de données MySQL
# Variable d'environnement DB_URL utilisée pour Docker, sinon valeur par défaut pour développement local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blog_collaboratif?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
# Nom d'utilisateur de la base de données (variable DB_USERNAME ou 'root' par défaut)
spring.datasource.username=${DB_USERNAME:root}
# Mot de passe de la base de données (variable DB_PASSWORD ou 'root' par défaut)
spring.datasource.password=${DB_PASSWORD:root}

# --- JPA / HIBERNATE CONFIGURATION ---
# ================================================================
# ATTENTION : ne jamais mettre 'create' ou 'create-drop' en dev
# 'create' = EFFACE TOUTES LES TABLES au démarrage → perte de données
# 'create-drop' = EFFACE TOUTES LES TABLES à l'arrêt → perte de données
# 'update' = met à jour le schéma sans effacer les données (DEV) ✅
# 'validate' = vérifie le schéma sans modifier (PROD) ✅
# ================================================================
spring.jpa.hibernate.ddl-auto=update
# Affiche les requêtes SQL dans les logs (false en production pour la sécurité)
spring.jpa.show-sql=false
# Formate les requêtes SQL pour meilleure lisibilité
spring.jpa.properties.hibernate.format_sql=false
# Dialecte Hibernate optimisé pour MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- THYMELEAF CONFIGURATION ---
# Désactive le cache Thymeleaf pour le développement (rechargement automatique des templates)
# En production, mettre 'true' pour de meilleures performances
spring.thymeleaf.cache=false
# Force l'encodage UTF-8 pour tous les templates
spring.thymeleaf.encoding=UTF-8

# --- ERROR HANDLING ---
# Désactive la page d'erreur par défaut de Spring Boot (whitelabel)
server.error.whitelabel.enabled=false
# Lève une exception si aucune route n'est trouvée (permet d'afficher notre page 404 personnalisée)
spring.mvc.throw-exception-if-no-handler-found=true

# --- SERVER CONFIGURATION ---
# Port d'écriture du serveur (modifiable via variable d'environnement PORT)
server.port=8080

# --- FILE UPLOAD CONFIGURATION ---
# Active le support des uploads de fichiers
spring.servlet.multipart.enabled=true
# Taille maximale d'un fichier individuel : 5MB
# Types autorisés : JPEG, PNG, GIF, WebP (validés dans le contrôleur)
spring.servlet.multipart.max-file-size=5MB
# Taille maximale totale d'une requête (incluant tous les fichiers) : 10MB
spring.servlet.multipart.max-request-size=10MB
# Répertoire de stockage des images uploadées
# Variable d'environnement UPLOAD_DIR utilisée pour Docker, sinon 'uploads/images' par défaut
app.upload.dir=${UPLOAD_DIR:uploads/images}

# --- SÉCURITÉ ET PERFORMANCE ---
# Pour la production, envisager d'ajouter :
# - spring.session.store-type=jdbc (sessions persistantes)
# - server.ssl.enabled=true (HTTPS)
# - management.endpoints.web.exposure.include=health,info (actuator limité)
# ===================================================================
