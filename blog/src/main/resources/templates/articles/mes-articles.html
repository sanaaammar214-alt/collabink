<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<body>

<!-- Page Title -->
<div class="page-title">
    <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">Mes Articles</h1>
        <nav class="breadcrumbs">
            <ol>
                <li><a th:href="@{/}">Accueil</a></li>
                <li><a th:href="@{/articles}">Articles</a></li>
                <li class="current">Mes Articles</li>
            </ol>
        </nav>
    </div>
</div>

<section class="section">
    <div class="container">

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${successMessage}">Succès</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <p class="text-muted">Vous avez publié <strong th:text="${articles.size()}">0</strong> article(s).</p>
            </div>
            <div class="col-md-6 text-end">
                <a th:href="@{/articles/new}" class="btn fw-semibold" style="background:#c9a84c;color:#111;border:none;">
                    <i class="bi bi-pencil-square me-1"></i> Nouvel Article
                </a>
            </div>
        </div>

        <!-- Liste mes articles -->
        <div class="row gy-4" th:if="${!articles.isEmpty()}">
            <div class="col-md-6 col-lg-4" th:each="article : ${articles}">
                <div class="card h-100 border-0 shadow-sm">
                    <!-- Image de couverture -->
                    <img th:if="${article.image != null and !article.image.isBlank()}"
                         th:src="@{/uploads/images/{img}(img=${article.image})}"
                         alt="Image article"
                         style="width:100%;height:180px;object-fit:cover;border-radius:8px 8px 0 0;">
                    <div th:unless="${article.image != null and !article.image.isBlank()}"
                         style="width:100%;height:180px;background:#f0e8d0;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-image" style="font-size:2rem;color:#c9a84c;"></i>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="d-flex gap-2 flex-wrap">
                                <span class="badge"
                                      style="background:#c9a84c;color:#111;font-size:0.62rem;letter-spacing:0.08em;"
                                      th:text="${article.categorie != null ? article.categorie.nom : 'Non classé'}">
                                    Catégorie
                                </span>
                                <span th:if="${article.statut != null and article.statut.name() == 'BROUILLON'}"
                                      class="badge bg-warning text-dark"
                                      style="font-size:0.62rem;letter-spacing:0.08em;">
                                    Brouillon
                                </span>
                            </div>
                            <small class="text-muted"
                                   th:text="${#temporals.format(article.datePublication,'dd MMM yyyy')}">
                                Date
                            </small>
                        </div>

                        <h5 class="card-title" style="font-family:'EB Garamond',serif;font-size:1.2rem;line-height:1.3;">
                            <a th:href="@{/articles/{id}(id=${article.id})}"
                               th:text="${article.titre}"
                               style="text-decoration:none;color:#1a1a2e;">Titre</a>
                        </h5>

                        <div class="d-flex gap-3 my-3">
                            <div class="text-center p-2 bg-light rounded" style="min-width: 60px;">
                                <div class="fw-bold" th:text="${article.likes.size()}">0</div>
                                <div class="text-muted small" style="font-size: 0.7rem;">Likes</div>
                            </div>
                            <div class="text-center p-2 bg-light rounded" style="min-width: 60px;">
                                <div class="fw-bold" th:text="${article.commentaires.size()}">0</div>
                                <div class="text-muted small" style="font-size: 0.7rem;">Comments</div>
                            </div>
                        </div>

                        <div class="mt-auto d-flex gap-2 pt-3 border-top"
                             th:if="${#authentication.name == article.auteur.email}">
                            <a th:href="@{/articles/{id}/edit(id=${article.id})}"
                               class="btn btn-sm btn-outline-secondary flex-fill">
                                <i class="bi bi-pencil"></i> Modifier
                            </a>
                            <form th:action="@{/articles/{id}/delete(id=${article.id})}" method="post"
                                  onsubmit="return confirm('Supprimer cet article ?')"
                                  class="flex-fill d-grid">
                                <input type="hidden" name="redirect" value="mes-articles">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i> Supprimer
                                </button>
                            </form>
                        </div>
                        
                        <!-- Admin peut seulement supprimer les articles des autres -->
                        <div class="mt-auto d-flex gap-2 pt-3 border-top"
                             th:if="${#authorization.expression('hasRole(''ADMIN'')') and #authentication.name != article.auteur.email}">
                            <form th:action="@{/articles/{id}/delete(id=${article.id})}" method="post"
                                  class="flex-fill d-grid">
                                <input type="hidden" name="redirect" value="mes-articles">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('En tant qu\'admin, vous ne pouvez que supprimer cet article. Continuer ?')">
                                    <i class="bi bi-shield-exclamation me-1"></i> Supprimer (Admin)
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vide -->
        <div class="text-center py-5" th:if="${articles.isEmpty()}">
            <div class="mb-3">
                <i class="bi bi-journal-x" style="font-size:4rem;color:#dee2e6;"></i>
            </div>
            <h3>Vous n'avez pas encore d'articles</h3>
            <p class="text-muted">Partagez votre premier article avec la communauté !</p>
            <a th:href="@{/articles/new}" class="btn mt-3 fw-semibold" style="background:#c9a84c;color:#111;border:none;">
                <i class="bi bi-pencil-square me-1"></i> Écrire mon premier article
            </a>
        </div>

    </div>
</section>

</body>
</html>
